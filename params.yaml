# params.yaml — versioned pipeline hyperparameters and parameters.
# Populated starting from Phase 1 (Data Pipeline and Versioning).

preprocess:
  test_size: 0.2
  random_state: 42
  scale_columns:
    - Time
    - Amount

# Versioned training parameters (Phase 2, Step 8). Shared keys apply to every
# run; each model owns a hyperparameter sub-block, so switching `train.model`
# never requires rewriting the rest. resolve_model_params() in
# src/models/train.py flattens the active model's sub-block onto the shared keys
# before build_model() sees them.
#
# `model` is xgboost as of Step 9, chosen on PR-AUC (0.8760, vs 0.7249 for the
# best logistic_regression run) — the primary metric fixed in ADR 0001.
# `threshold` is provisional (Step 10 optimizes it).
# `resampling` is mutually exclusive with class weighting per run and is a
# SHARED key: it is honored for logistic_regression (smote disables
# class_weight). xgboost's imbalance knob is scale_pos_weight instead, and it
# silently ignores class_weight, so xgboost MUST pair with resampling=none —
# smote would double-correct (scale_pos_weight AND SMOTE at once). That is why
# activating xgboost in Step 9 flips resampling to none in the same change.
train:
  model: xgboost
  threshold: 0.5
  resampling: none
  random_state: 42
  logistic_regression:
    max_iter: 1000
  xgboost:
    n_estimators: 300
    max_depth: 5
    learning_rate: 0.1
    scale_pos_weight: 577.29
