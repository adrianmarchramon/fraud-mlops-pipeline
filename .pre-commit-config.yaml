repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.20  # pinned by `pre-commit autoupdate`
    hooks:
      - id: ruff-check
        args: [--fix]
      - id: ruff-format
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0  # pinned by `pre-commit autoupdate`
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-added-large-files
        args: [--maxkb=1024]  # EDA notebook is committed with plot outputs (~540 KB)
